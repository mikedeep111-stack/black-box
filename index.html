<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>PREMIUM CINEMA | Stable Version</title>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: #111; border-radius: 10px; overflow: hidden; border: 1px solid #222; transition: 0.3s; cursor: pointer; }
        .card:hover { border-color: #e50914; transform: scale(1.05); }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .card h3 { font-size: 14px; padding: 10px; margin: 0; }
        .btn-watch { background: #e50914; border: none; color: white; padding: 10px; width: 100%; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h1 style="color: #e50914;">PREMIUM CINEMA</h1>
    <p id="status">النظام يعمل الآن من القاعدة المحلية (High Stability)</p>

    <div class="grid" id="grid"></div>

    <script>
        // أفلام حقيقية ببوسترات مباشرة وروابط مشاهدة عالمية
        const movies = [
            { title: "Mickey 17", id: "tt2222042", img: "https://image.tmdb.org/t/p/w500/lr9YpYv86mK65U398T477vclv1m.jpg" },
            { title: "Joker: Folie à Deux", id: "tt11315808", img: "https://image.tmdb.org/t/p/w500/n6p9akS6YpW68qR08B3i7nO0YvO.jpg" },
            { title: "The Batman II", id: "tt11353000", img: "https://image.tmdb.org/t/p/w500/y6vFhT4lG39Y9oZ7lK6Y7U6n1M8.jpg" },
            { title: "Gladiator II", id: "tt9218128", img: "https://image.tmdb.org/t/p/w500/h9YpYv86mK65U398T477vclv1m.jpg" },
            { title: "Deadpool & Wolverine", id: "tt6263850", img: "https://image.tmdb.org/t/p/w500/8cdWjvZQUvHov0GTJ3N6Btp0HNi.jpg" }
        ];

        const grid = document.getElementById('grid');
        grid.innerHTML = movies.map(m => `
            <div class="card" onclick="window.open('https://vidsrc.me/embed/movie?imdb=${m.id}', '_blank')">
                <img src="${m.img}" alt="${m.title}">
                <h3>${m.title}</h3>
                <button class="btn-watch">شاهد الآن</button>
            </div>
        `).join('');
    </script>
</body>
</html>
