<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Cinema | عالم الأفلام</title>
    <style>
        body { background: #0a0b10; color: white; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        .search-bar { margin-bottom: 30px; }
        input { padding: 12px; width: 60%; border-radius: 5px; border: none; }
        button { padding: 12px 20px; background: #e50914; color: white; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; }
        #movies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .movie-card { background: #1a1c24; border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.3s; }
        .movie-card:hover { transform: scale(1.05); }
        .movie-card img { width: 100%; height: 270px; object-fit: cover; }
        .movie-info { padding: 10px; font-size: 14px; }
    </style>
</head>
<body>
    <h1 style="color: #e50914;">PREMIUM CINEMA</h1>
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="ابحث عن أي فيلم في العالم...">
        <button onclick="searchMovies()">بحث</button>
    </div>
    <div id="movies-grid"></div>

    <script>
        const API_KEY = '15d12028d091151270b790a61821869e';

        async function searchMovies() {
            const query = document.getElementById('searchInput').value;
            const url = `https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${query}&language=ar-SA`;
            const res = await fetch(url);
            const data = await res.json();
            displayMovies(data.results);
        }

        function displayMovies(movies) {
            const container = document.getElementById('movies-grid');
            container.innerHTML = movies.map(movie => `
                <div class="movie-card" onclick="playMovie('${movie.id}')">
                    <img src="https://image.tmdb.org/t/p/w500${movie.poster_path}" alt="${movie.title}" onerror="this.src='https://via.placeholder.com/500x750?text=No+Poster'">
                    <div class="movie-info">
                        <h3>${movie.title}</h3>
                        <p>${movie.release_date ? movie.release_date.split('-')[0] : ''}</p>
                    </div>
                </div>
            `).join('');
        }

        function playMovie(id) {
            window.open(`https://vidsrc.me/embed/movie?tmdb=${id}`, '_blank');
        }

        // جلب أفلام مقترحة عند فتح الموقع
        window.onload = async () => {
            const res = await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}&language=ar-SA`);
            const data = await res.json();
            displayMovies(data.results);
        };
    </script>
</body>
</html>
