<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINE RED | SEARCH MODE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;900&display=swap');
        body { background: #050505; color: white; font-family: 'Cairo', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .search-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s; }
        .search-input:focus { background: rgba(220,38,38,0.05); border-color: #dc2626; outline: none; box-shadow: 0 0 20px rgba(220,38,38,0.2); }
    </style>
</head>
<body class="p-6">

    <nav class="flex justify-between items-center mb-12">
        <div class="flex items-center gap-2">
            <div class="bg-red-600 w-8 h-8 rounded flex items-center justify-center shadow-lg shadow-red-600/50">
                <span class="font-black italic text-sm">R</span>
            </div>
            <span class="text-xl font-black italic tracking-tighter uppercase">CINE<span class="text-red-600">RED</span></span>
        </div>
        <div class="text-xs font-mono text-red-600 animate-pulse">SYSTEM_STATUS: ACTIVE</div>
    </nav>

    <div class="max-w-4xl mx-auto text-center mb-16">
        <h1 class="text-4xl font-black mb-8 uppercase tracking-tighter">ماذا تريد أن تشاهد يا إليوت؟</h1>
        <div class="relative max-w-2xl mx-auto">
            <input type="text" id="query" oninput="search()" placeholder="اكتب اسم الفيلم أو المسلسل هنا..." 
                   class="search-input w-full p-5 rounded-2xl text-xl text-center">
        </div>
    </div>

    <div id="results" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
        </div>

    <div id="player" class="fixed inset-0 z-[100] bg-black hidden flex-col items-center justify-center p-4">
        <button onclick="closePlayer()" class="absolute top-6 left-6 text-4xl hover:text-red-600">&times;</button>
        <div class="w-full max-w-5xl aspect-video rounded-3xl overflow-hidden shadow-2xl border border-white/5 bg-zinc-900">
            <iframe id="iframe" class="w-full h-full" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        const KEY = '840134f728c3a9d9e68e0e7a1262d495';
        const IMG = 'https://image.tmdb.org/t/p/w500';

        async function search() {
            const q = document.getElementById('query').value;
            if(q.length < 2) return;

            const r = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${KEY}&query=${q}&language=ar-SA`);
            const d = await r.json();
            
            document.getElementById('results').innerHTML = d.results.map(m => `
                <div onclick="play('${m.id}', '${m.media_type}')" class="group cursor-pointer">
                    <div class="aspect-[2/3] rounded-xl overflow-hidden border border-white/5 group-hover:border-red-600 transition-all shadow-xl mb-3">
                        <img src="${m.poster_path ? IMG+m.poster_path : 'https://via.placeholder.com/500x750?text=No+Poster'}" class="w-full h-full object-cover">
                    </div>
                    <h3 class="text-sm font-bold truncate">${m.title || m.name}</h3>
                    <p class="text-xs text-gray-500">${m.release_date ? m.release_date.split('-')[0] : (m.media_type == 'tv' ? 'مسلسل' : '')}</p>
                </div>
            `).join('');
        }

        function play(id, type) {
            const embedType = type === 'tv' ? 'tv' : 'movie';
            document.getElementById('iframe').src = `https://vidsrc.me/embed/${embedType}?tmdb=${id}`;
            document.getElementById('player').classList.remove('hidden');
            document.getElementById('player').classList.add('flex');
        }

        function closePlayer() {
            document.getElementById('player').classList.replace('flex', 'hidden');
            document.getElementById('iframe').src = '';
        }
    </script>
</body>
</html>
