<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>PREMIUM CINEMA | Debug Mode</title>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; text-align: center; }
        .search-area { padding: 40px; }
        input { padding: 15px; width: 60%; border-radius: 5px; border: 1px solid #333; background: #111; color: white; }
        button { padding: 15px 25px; background: #e50914; color: white; border: none; cursor: pointer; border-radius: 5px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: #111; border-radius: 8px; overflow: hidden; border: 1px solid #222; cursor: pointer; }
        .card img { width: 100%; height: 240px; object-fit: cover; }
        #log { color: #ffcc00; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>

    <h1 style="color:#e50914">PREMIUM CINEMA</h1>
    
    <div class="search-area">
        <input type="text" id="inp" placeholder="جرب ابحث عن Joker...">
        <button id="btn">بحث</button>
        <div id="log">حالة النظام: خامل</div>
    </div>

    <div class="grid" id="grid"></div>

    <script>
        // قمت بتغيير المفتاح لمفتاح جديد تماماً الآن
        const API_KEY = '840134f728c3a9d9e68e0e7a1262d495'; 
        const grid = document.getElementById('grid');
        const log = document.getElementById('log');

        async function startSearch(query = "") {
            log.innerText = "جاري محاولة الاتصال بـ TMDB...";
            
            const url = query 
                ? `https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(query)}&language=ar-SA`
                : `https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}&language=ar-SA`;

            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error(`خطأ من السيرفر: ${res.status}`);
                
                const data = await res.json();
                
                if (data.results.length === 0) {
                    log.innerText = "السيرفر استجاب ولكن لا توجد نتائج لهذا الاسم.";
                } else {
                    log.innerText = `تم العثور على ${data.results.length} فيلم.`;
                    render(data.results);
                }
            } catch (err) {
                log.innerText = "فشل الاتصال: " + err.message + " (قد يكون المفتاح محظوراً أو الإنترنت ضعيف)";
                console.error(err);
            }
        }

        function render(movies) {
            grid.innerHTML = movies.map(m => `
                <div class="card" onclick="window.open('https://vidsrc.me/embed/movie?tmdb=${m.id}', '_blank')">
                    <img src="https://image.tmdb.org/t/p/w500${m.poster_path}" onerror="this.src='https://via.placeholder.com/200x300?text=No+Image'">
                    <p>${m.title}</p>
                </div>
            `).join('');
        }

        document.getElementById('btn').onclick = () => startSearch(document.getElementById('inp').value);
        window.onload = () => startSearch();
    </script>
</body>
</html>
