<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Cinema | عالم الأفلام</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: white; }
        .movie-card { transition: transform 0.3s; border: 1px solid #1e293b; }
        .movie-card:hover { transform: scale(1.05); border-color: #ef4444; }
        #player-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 999; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div id="player-container">
        <button onclick="closePlayer()" class="absolute top-5 right-5 bg-red-600 px-4 py-2 rounded font-bold">إغلاق X</button>
        <iframe id="video-player" src="" class="w-full h-full" frameborder="0" allowfullscreen></iframe>
    </div>

    <header class="flex justify-between items-center mb-10 border-b border-slate-800 pb-6">
        <h1 class="text-3xl font-black text-red-600 tracking-tighter">PREMIUM<span class="text-white">CINEMA</span></h1>
        <div class="bg-slate-900 px-4 py-1 rounded-full text-xs text-slate-400 border border-slate-700">50 Movies Active</div>
    </header>

    <div id="movie-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">
        </div>

    <script>
        async function loadMovies() {
            const response = await fetch('database.json');
            const data = await response.json();
            const grid = document.getElementById('movie-grid');
            grid.innerHTML = '';
            
            data.forEach(movie => {
                // مصدر صور بديل واحترافي (TMDB Mirror)
                const poster = `https://vidsrc.xyz/images/movies/${movie.imdb}.jpg`;
                grid.innerHTML += `
                    <div class="movie-card bg-slate-900 rounded-xl overflow-hidden cursor-pointer shadow-2xl" onclick="playMovie('${movie.url}')">
                        <div class="relative">
                            <img src="${poster}" onerror="this.src='https://via.placeholder.com/300x450/0f172a/white?text=${movie.title}'" class="w-full h-64 object-cover">
                            <div class="absolute inset-0 bg-black opacity-0 hover:opacity-40 transition-opacity flex items-center justify-center">
                                <span class="text-4xl">▶️</span>
                            </div>
                        </div>
                        <div class="p-4 text-center">
                            <h3 class="text-sm font-bold truncate">${movie.title}</h3>
                        </div>
                    </div>
                `;
            });
        }

        function playMovie(url) {
            document.getElementById('video-player').src = url;
            document.getElementById('player-container').style.display = 'block';
            document.body.style.overflow = 'hidden'; // منع التمرير خلف المشغل
        }

        function closePlayer() {
            document.getElementById('player-container').style.display = 'none';
            document.getElementById('video-player').src = '';
            document.body.style.overflow = 'auto';
        }

        loadMovies();
    </script>
</body>
</html>
