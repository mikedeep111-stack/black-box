<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINE RED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020202; color: white; margin: 0; font-family: sans-serif; }
        .hero-gradient { background: linear-gradient(to top, #020202 20%, transparent); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-card { border: 2px solid #ef4444; box-shadow: 0 0 20px rgba(239, 68, 68, 0.5); opacity: 1 !important; }
    </style>
</head>
<body>
    <div id="bg" class="fixed inset-0 z-0 bg-cover bg-center opacity-40 transition-all duration-1000"></div>
    <div class="fixed inset-0 z-0 hero-gradient"></div>

    <nav class="relative z-50 p-6 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="bg-red-600 p-2 rounded shadow-lg shadow-red-600/50">
                <span class="font-black italic text-xl">R</span>
            </div>
            <span class="text-xl font-black italic tracking-tighter uppercase">CINE<span class="text-red-600">RED</span></span>
        </div>
    </nav>

    <main class="relative z-10 px-6 pt-10">
        <div id="hero-content" class="max-w-xl min-h-[300px]">
            <h1 id="t" class="text-5xl font-black mb-4 leading-tight uppercase"></h1>
            <p id="d" class="text-sm opacity-70 mb-8 line-clamp-3 leading-relaxed"></p>
            <button onclick="playMovie()" class="bg-red-600 px-8 py-4 rounded-full font-black text-sm hover:scale-105 transition-all shadow-xl">▶ شاهد الآن</button>
        </div>

        <section class="mt-20">
            <h2 class="text-sm font-bold mb-6 text-gray-500 tracking-widest">المقترح لك الليلة</h2>
            <div id="list" class="flex gap-4 overflow-x-auto pb-10 no-scrollbar items-center">
                </div>
        </section>
    </main>

    <div id="modal" class="fixed inset-0 z-[100] bg-black hidden flex-col">
        <div class="p-4 flex justify-end">
            <button onclick="closeP()" class="text-3xl">&times;</button>
        </div>
        <iframe id="f" class="w-full flex-grow border-0" allowfullscreen></iframe>
    </div>

    <script>
        const K = '840134f728c3a9d9e68e0e7a1262d495';
        const IMG = 'https://image.tmdb.org/t/p/w500';
        const IMG_HD = 'https://image.tmdb.org/t/p/original';
        let currentId = '';

        async function start() {
            try {
                const res = await fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${K}&language=ar-SA`);
                const data = await res.json();
                const ms = data.results.slice(0, 10);
                
                const list = document.getElementById('list');
                list.innerHTML = ms.map((m, i) => `
                    <img src="${IMG}${m.poster_path}" 
                         id="card-${m.id}"
                         onclick='updateHero(${JSON.stringify(m).replace(/'/g, "&apos;")})'
                         class="w-32 rounded-xl cursor-pointer opacity-40 transition-all duration-300">
                `).join('');

                updateHero(ms[0]);
            } catch (e) {
                document.getElementById('t').innerText = "خطأ في الاتصال بالسيرفر";
            }
        }

        function updateHero(m) {
            currentId = m.id;
            document.getElementById('bg').style.backgroundImage = \`url('\${IMG_HD}\${m.backdrop_path}')\`;
            document.getElementById('t').innerText = m.title;
            document.getElementById('d').innerText = m.overview;
            
            document.querySelectorAll('#list img').forEach(img => img.classList.remove('active-card'));
            document.getElementById('card-' + m.id).classList.add('active-card');
        }

        function playMovie() {
            document.getElementById('f').src = \`https://vidsrc.me/embed/movie?tmdb=\${currentId}\`;
            document.getElementById('modal').classList.replace('hidden', 'flex');
        }

        function closeP() {
            document.getElementById('modal').classList.replace('flex', 'hidden');
            document.getElementById('f').src = '';
        }

        start();
    </script>
</body>
</html>
